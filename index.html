<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Krishna Designs — Premium Blouse & Embroidery, Eluru</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--m:#800020;--md:#5c0016;--ml:#a0002a;--g:#D4AF37;--gl:#e8c84a;--gd:#b8931e;--b:#F8F4EC;--bd:#ede8da;--t:#1a0a0f;--tm:#4a2030;--ts:#9a7080;--w:#fff}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--w);color:var(--t)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--m);border-radius:2px}
.nav{position:sticky;top:0;z-index:100;height:62px;background:rgba(255,255,255,.97);backdrop-filter:blur(16px);border-bottom:1px solid rgba(212,175,55,.2);display:flex;align-items:center;padding:0 24px;gap:16px}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--m);cursor:pointer;flex-shrink:0}
.logo b{color:var(--g)}
.nav-links{display:flex;gap:2px;flex:1}
.nl{background:none;border:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--ts);padding:7px 12px;border-radius:8px;transition:.2s;font-family:'Inter',sans-serif}
.nl:hover,.nl.on{background:rgba(128,0,32,.07);color:var(--m)}
.nav-r{display:flex;gap:8px;align-items:center;flex-shrink:0}
.btn-ghost{background:none;border:1.5px solid var(--bd);color:var(--tm);font-size:13px;font-weight:500;padding:7px 16px;border-radius:100px;cursor:pointer;transition:.2s;font-family:'Inter',sans-serif}
.btn-ghost:hover{border-color:var(--m);color:var(--m)}
.btn-prim{background:var(--m);color:#fff;font-size:13px;font-weight:600;padding:7px 16px;border-radius:100px;cursor:pointer;border:none;transition:.2s;font-family:'Inter',sans-serif}
.btn-prim:hover{background:var(--ml)}
.cart-wrap{position:relative;cursor:pointer}
.cart-btn{background:none;border:none;font-size:22px;cursor:pointer;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:.2s}
.cart-btn:hover{background:var(--b)}
.cart-badge{position:absolute;top:0;right:0;background:var(--m);color:#fff;border-radius:50%;width:17px;height:17px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff}
.hero{background:linear-gradient(135deg,#3d0010 0%,var(--m) 55%,#6b001a 100%);min-height:88vh;display:flex;align-items:center;padding:64px 24px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;opacity:.4;background-image:radial-gradient(circle at 20% 50%,rgba(212,175,55,.08) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(255,255,255,.04) 0%,transparent 40%)}
.hero-in{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1.1fr .9fr;gap:56px;align-items:center;position:relative;z-index:1;width:100%}
.hero-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.28);color:#e8c84a;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:7px 16px;border-radius:100px;margin-bottom:22px}
.hero h1{font-family:'Playfair Display',serif;font-size:50px;font-weight:700;color:#fff;line-height:1.1;margin-bottom:18px}
.hero h1 em{color:var(--g);font-style:italic}
.hero-sub{font-size:16px;color:rgba(255,255,255,.62);line-height:1.75;margin-bottom:28px;font-weight:300}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:36px}
.hbtn1{background:var(--g);color:var(--t);border:none;padding:14px 28px;border-radius:100px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;font-family:'Inter',sans-serif}
.hbtn1:hover{background:var(--gl);transform:translateY(-2px)}
.hbtn2{background:rgba(255,255,255,.08);color:#fff;border:1.5px solid rgba(255,255,255,.28);padding:14px 28px;border-radius:100px;font-size:15px;font-weight:500;cursor:pointer;transition:.2s;font-family:'Inter',sans-serif}
.hbtn2:hover{background:rgba(255,255,255,.14)}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.hstat{background:rgba(255,255,255,.06);border:1px solid rgba(212,175,55,.14);border-radius:12px;padding:16px;text-align:center}
.hstat-n{font-family:'Playfair Display',serif;font-size:28px;color:var(--g);font-weight:700;line-height:1}
.hstat-l{font-size:11px;color:rgba(255,255,255,.42);margin-top:4px;font-weight:500;letter-spacing:.5px}
.hero-cards{display:flex;flex-direction:column;gap:12px}
.hcard{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px;transition:.2s}
.hcard:hover{background:rgba(255,255,255,.11)}
.hcard-ico{width:46px;height:46px;background:rgba(212,175,55,.1);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hcard strong{font-size:14px;color:#fff;display:block;margin-bottom:2px;font-weight:600}
.hcard span{font-size:12px;color:rgba(255,255,255,.42)}
.strip{background:var(--m);padding:13px 24px}
.strip-in{max-width:1100px;margin:0 auto;display:flex;gap:28px;flex-wrap:wrap;justify-content:center}
.strip-it{display:flex;align-items:center;gap:7px;color:rgba(255,255,255,.85);font-size:13px;font-weight:500}
.sec{padding:72px 24px}.sec.bg{background:var(--b)}
.sec-in{max-width:1100px;margin:0 auto}.sec-in.n{max-width:720px}
.sh{text-align:center;margin-bottom:44px}
.sh .tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gd);margin-bottom:10px}
.sh h2{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:var(--t);margin-bottom:8px}
.sh p{font-size:16px;color:var(--ts);font-weight:300}
.gbar{width:44px;height:3px;background:linear-gradient(90deg,var(--g),var(--gl));border-radius:2px;margin:14px auto 0}
.steps-g{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.step{text-align:center}
.step-n{display:inline-block;background:var(--g);color:var(--t);font-size:10px;font-weight:700;padding:3px 10px;border-radius:100px;margin-bottom:12px;letter-spacing:.5px}
.step-ico{width:60px;height:60px;background:linear-gradient(135deg,var(--m),var(--ml));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:22px;box-shadow:0 6px 20px rgba(128,0,32,.22);border:3px solid #fff}
.step h3{font-size:15px;font-weight:600;color:var(--t);margin-bottom:6px}
.step p{font-size:13px;color:var(--ts);line-height:1.6}
.cat-g{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.cat{background:#fff;border:1.5px solid var(--bd);border-radius:16px;padding:26px 18px;text-align:center;cursor:pointer;transition:.25s;position:relative;overflow:hidden}
.cat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--g),var(--gl));transform:scaleX(0);transition:.3s;transform-origin:left}
.cat:hover{border-color:var(--g);transform:translateY(-4px);box-shadow:0 14px 36px rgba(128,0,32,.09)}
.cat:hover::after{transform:scaleX(1)}
.cat-ico{width:60px;height:60px;background:linear-gradient(135deg,var(--b),var(--bd));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px}
.cat h3{font-size:16px;font-weight:600;color:var(--t);margin-bottom:5px}
.cat p{font-size:13px;color:var(--ts);line-height:1.5}
.cat-cnt{display:inline-block;margin-top:10px;font-size:11px;font-weight:700;color:var(--gd);letter-spacing:.5px;text-transform:uppercase}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;justify-content:center}
.fb{background:none;border:1.5px solid var(--bd);color:var(--ts);padding:8px 18px;border-radius:100px;cursor:pointer;font-size:13px;font-weight:500;transition:.2s;font-family:'Inter',sans-serif}
.fb:hover,.fb.on{background:var(--m);color:#fff;border-color:var(--m)}
.ss-row{display:flex;gap:12px;margin-bottom:22px;flex-wrap:wrap;justify-content:center}
.si{flex:1;min-width:200px;max-width:360px;padding:11px 16px;border:1.5px solid var(--bd);border-radius:100px;font-size:14px;background:var(--b);outline:none;font-family:'Inter',sans-serif;transition:.2s}
.si:focus{border-color:var(--g)}
.ss{padding:11px 16px;border:1.5px solid var(--bd);border-radius:100px;font-size:13px;background:var(--b);outline:none;cursor:pointer;font-family:'Inter',sans-serif}
.dg{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.dc{background:#fff;border:1.5px solid var(--bd);border-radius:16px;overflow:hidden;cursor:pointer;transition:.25s}
.dc:hover{box-shadow:0 16px 48px rgba(128,0,32,.14);transform:translateY(-4px);border-color:rgba(212,175,55,.5)}
.dci{height:195px;position:relative;display:flex;align-items:center;justify-content:center;font-size:72px}
.dbadge{position:absolute;top:12px;left:12px;background:var(--m);color:#fff;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:100px}
.ddays{position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,.58);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:100px;backdrop-filter:blur(4px)}
.dwish{position:absolute;top:12px;right:12px;width:34px;height:34px;background:rgba(255,255,255,.92);border:none;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s}
.dwish:hover{transform:scale(1.12)}
.dcb{padding:16px}
.dcb h3{font-size:15px;font-weight:600;color:var(--t);margin-bottom:3px}
.dcb p{font-size:12px;color:var(--ts);margin-bottom:8px}
.dc-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.dcp{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--m)}
.dcp small{font-size:11px;color:var(--ts);font-weight:400;font-family:'Inter',sans-serif}
.dtag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px}
.dc-btn{width:100%;background:transparent;border:1.5px solid var(--m);color:var(--m);padding:10px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;transition:.2s;font-family:'Inter',sans-serif}
.dc-btn:hover{background:var(--m);color:#fff}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.tc{background:#fff;border:1.5px solid var(--bd);border-radius:16px;padding:22px;transition:.2s}
.tc:hover{box-shadow:0 6px 24px rgba(128,0,32,.07)}
.tc-stars{color:var(--g);font-size:16px;margin-bottom:10px}
.tc blockquote{font-size:14px;color:var(--tm);line-height:1.75;margin-bottom:12px;font-style:italic;font-weight:300}
.tc-name{font-size:13px;font-weight:600;color:var(--t)}
.tc-city{font-size:12px;color:var(--ts);margin-top:2px}
.shop-g{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.ic{background:var(--b);border:1.5px solid var(--bd);border-radius:16px;padding:24px}
.ic h3{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:16px}
.ir{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd);font-size:14px;line-height:1.5}
.ir:last-child{border-bottom:none}
.ir a{color:var(--m);text-decoration:none}
.dc2{background:linear-gradient(135deg,var(--md),var(--m));border-radius:16px;padding:24px;color:#fff}
.dc2 h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--g);margin-bottom:14px}
.di{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:14px;color:rgba(255,255,255,.8)}
.di:last-child{border-bottom:none}
.overlay{position:fixed;inset:0;background:rgba(10,0,5,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.modal{background:#fff;border-radius:20px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;position:relative;animation:pop .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.m-img{height:230px;display:flex;align-items:center;justify-content:center;font-size:88px;border-radius:20px 20px 0 0}
.m-body{padding:22px}
.m-body h2{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:6px}
.m-desc{font-size:14px;color:var(--ts);line-height:1.7;margin-bottom:14px}
.ready-box{background:#ecfdf5;border:1.5px solid #86efac;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
.ready-box strong{font-size:14px;font-weight:700;color:#166534;display:block}
.ready-box span{font-size:13px;color:#166534}
.m-tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.mt{font-size:12px;font-weight:500;padding:4px 12px;background:var(--b);border-radius:100px;color:var(--tm)}
.up-zone{border:2px dashed var(--bd);border-radius:12px;padding:20px;text-align:center;cursor:pointer;margin-bottom:14px;transition:.2s}
.up-zone:hover{border-color:var(--g);background:rgba(212,175,55,.03)}
.up-zone div{font-size:26px;margin-bottom:5px}
.up-zone p{font-size:13px;color:var(--ts)}
.note{width:100%;padding:12px 14px;border:1.5px solid var(--bd);border-radius:12px;font-size:14px;color:var(--t);background:var(--b);resize:vertical;min-height:76px;outline:none;font-family:'Inter',sans-serif;margin-bottom:14px;transition:.2s}
.note:focus{border-color:var(--g)}
.pstrip{background:var(--b);border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:18px;font-size:14px}
.pstrip strong{color:var(--m);font-size:20px;font-family:'Playfair Display',serif}
.m-actions{display:flex;gap:10px}
.ma-btn{flex:1;padding:13px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:600;transition:.2s;font-family:'Inter',sans-serif}
.ma-p{background:var(--m);color:#fff;border:none}
.ma-p:hover{background:var(--ml)}
.ma-s{background:none;border:1.5px solid var(--m);color:var(--m)}
.ma-s:hover{background:var(--m);color:#fff}
.cls-btn{position:absolute;top:14px;right:14px;width:36px;height:36px;background:rgba(255,255,255,.92);border:none;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.2s}
.cls-btn:hover{background:#fff;transform:scale(1.1)}
.lm{background:#fff;border-radius:20px;width:100%;max-width:400px;overflow:hidden;animation:pop .25s cubic-bezier(.34,1.56,.64,1)}
.lm-top{background:linear-gradient(135deg,var(--md),var(--m));padding:28px;text-align:center}
.lm-logo{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:#fff}
.lm-logo b{color:var(--g)}
.lm-sub{font-size:13px;color:rgba(255,255,255,.55);margin-top:5px}
.lm-tabs{display:flex;background:var(--b);border-bottom:2px solid var(--bd)}
.lt{flex:1;padding:12px 6px;background:none;border:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--ts);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s;font-family:'Inter',sans-serif}
.lt.on{color:var(--m);border-bottom-color:var(--m);font-weight:700}
.lm-body{padding:22px}
.lf{margin-bottom:14px}
.lf label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ts);display:block;margin-bottom:6px}
.linput{width:100%;padding:11px 14px;border:1.5px solid var(--bd);border-radius:10px;font-size:15px;color:var(--t);background:var(--b);outline:none;transition:.2s;font-family:'Inter',sans-serif}
.linput:focus{border-color:var(--g);background:#fff}
.pw-w{position:relative}
.pw-w .linput{padding-right:44px}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--ts)}
.phone-w{display:flex;border:1.5px solid var(--bd);border-radius:10px;overflow:hidden;background:var(--b);transition:.2s}
.phone-w:focus-within{border-color:var(--g)}
.phone-pfx{padding:11px 12px;font-size:14px;color:var(--tm);background:var(--bd);border-right:1.5px solid var(--bd);flex-shrink:0;font-weight:600}
.phone-w input{flex:1;padding:11px 14px;border:none;background:transparent;font-size:15px;color:var(--t);outline:none;font-family:'Inter',sans-serif}
.lbtn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--m);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;font-family:'Inter',sans-serif;margin-bottom:10px}
.lbtn:hover{background:var(--ml)}
.lbtn:disabled{background:var(--ts);cursor:not-allowed}
.or-r{display:flex;align-items:center;gap:10px;margin:10px 0}
.or-r div{flex:1;height:1px;background:var(--bd)}
.or-r span{font-size:12px;color:var(--ts)}
.gbtn{width:100%;padding:11px;border-radius:10px;border:1.5px solid var(--bd);background:#fff;font-size:15px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;transition:.2s}
.gbtn:hover{border-color:var(--ts)}
.otp-r{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.otp-b{width:44px;height:52px;text-align:center;font-size:22px;font-weight:700;border:1.5px solid var(--bd);border-radius:10px;background:var(--b);outline:none;color:var(--m);font-family:'Playfair Display',serif;transition:.2s}
.otp-b:focus{border-color:var(--g);background:#fff}
.lerr{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;color:#dc2626;margin-bottom:12px;font-weight:500}
.lskip{background:none;border:none;cursor:pointer;font-size:13px;color:var(--ts);text-decoration:underline;display:block;width:100%;margin-top:8px;font-family:'Inter',sans-serif;transition:.2s}
.lskip:hover{color:var(--m)}
.owner-note{background:rgba(128,0,32,.04);border:1.5px solid rgba(128,0,32,.1);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--tm);margin-bottom:14px;line-height:1.5}
.card{background:#fff;border:1.5px solid var(--bd);border-radius:16px;padding:22px}
.ph{margin-bottom:24px}
.ph h1{font-family:'Playfair Display',serif;font-size:30px;color:var(--t)}
.ph p{font-size:15px;color:var(--ts);margin-top:4px;font-weight:300}
.ph .bar{width:40px;height:3px;background:linear-gradient(90deg,var(--g),var(--gl));border-radius:2px;margin-top:10px}
.track-row{display:flex;gap:10px;margin-bottom:18px}
.ti{flex:1;padding:12px 16px;border:1.5px solid var(--bd);border-radius:10px;font-size:15px;color:var(--t);background:var(--b);outline:none;font-family:'Inter',sans-serif;transition:.2s}
.ti:focus{border-color:var(--g)}
.tbtn{background:var(--m);color:#fff;border:none;padding:12px 22px;border-radius:10px;cursor:pointer;font-size:15px;font-weight:600;font-family:'Inter',sans-serif;transition:.2s}
.tbtn:hover{background:var(--ml)}
.omg{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;background:var(--b);border-radius:12px;padding:14px;margin-bottom:22px}
.om .ol{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ts)}
.om .ov{font-size:15px;font-weight:700;color:var(--t);margin-top:3px;font-family:'Playfair Display',serif}
.om .ov.r{color:var(--m)}
.tl{padding-left:38px;position:relative}
.tl::before{content:'';position:absolute;left:17px;top:18px;bottom:18px;width:2px;background:var(--bd)}
.tlr{display:flex;gap:14px;margin-bottom:22px;position:relative;align-items:flex-start}
.tlr:last-child{margin-bottom:0}
.tld{position:absolute;left:-38px;width:34px;height:34px;border-radius:50%;border:2px solid var(--bd);background:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.tlr.done .tld{background:var(--m);border-color:var(--m);color:#fff}
.tlr.active .tld{background:var(--g);border-color:var(--g);box-shadow:0 0 0 5px rgba(212,175,55,.18)}
.tlt{font-size:15px;font-weight:600;color:var(--t)}

function useToast(){
  const [m,setM]=useState("");const [s,setS]=useState(false);const t=useRef(null);

function LoginModal({onCust,onAdmin,onClose}){
  const [tab,setTab]=useState("cust");
  const [ph,setPh]=useState("");const [nm,setNm]=useState("");
  const [em,setEm]=useState("");const [pw,setPw]=useState("");
  const [otp,setOtp]=useState(["","","","","",""]);
  const [step,setStep]=useState("form");
  const [showPw,setShowPw]=useState(false);
  const [loading,setLoading]=useState(false);const [err,setErr]=useState("");
  const refs=Array.from({length:6},()=>null);

  const sendOtp=()=>{
    if(ph.trim().length<10){setErr("Enter a valid 10-digit mobile number");return;}
    setErr("");setLoading(true);
    setTimeout(()=>{setLoading(false);setStep("otp");},900);
  };
  const verify=()=>{
    if(otp.join("").length<6){setErr("Enter all 6 digits");return;}
    setLoading(true);
    setTimeout(()=>{setLoading(false);onCust({name:nm||"Customer",phone:ph});},700);
  };
  const adminLogin=()=>{
    setErr("");
    if(!em||!pw){setErr("Enter email and password");return;}
    setLoading(true);
    setTimeout(()=>{
      if(em.trim().toLowerCase()==="admin@krishnadesigns.in"&&pw==="krishna@2025"){
        setLoading(false);onAdmin();
      } else {
        setLoading(false);setErr("Incorrect credentials. Access denied.");
      }
    },900);
  };

  return(<div className="overlay" onClick={onClose}><div className="lm" onClick={e=>e.stopPropagation()}>
    <div className="lm-top">
      <div className="lm-logo">Krishna<b>Designs</b></div>
      <p className="lm-sub">Eluru, Andhra Pradesh · by M Vara Lakshmi</p>
    </div>
    <div className="lm-tabs">
      {[["cust","Sign In"],["reg","Register"],["owner","🔐 Owner"]].map(([id,l])=>(
        <button key={id} className={"lt"+(tab===id?" on":"")} onClick={()=>{setTab(id);setStep("form");setErr("");}}>{l}</button>
      ))}
    </div>
    <div className="lm-body">
      {err&&<div className="lerr">⚠️ {err}</div>}

      {(tab==="cust"||tab==="reg")&&step==="otp"&&(<>
        <p style={{textAlign:"center",fontSize:14,color:"var(--ts)",marginBottom:18}}>OTP sent to <b>+91 {ph}</b></p>
        <div className="otp-r">{otp.map((v,i)=>(
          <input key={i} ref={el=>refs[i]=el} className="otp-b" type="text" inputMode="numeric" maxLength={1} value={v}
            onChange={e=>{const d=[...otp];d[i]=e.target.value.replace(/\D/g,"").slice(-1);setOtp(d);if(e.target.value&&i<5)refs[i+1]?.focus();}}
            onKeyDown={e=>e.key==="Backspace"&&!v&&i>0&&refs[i-1]?.focus()}/>
        ))}</div>
        <button className="lbtn" onClick={verify} disabled={loading}>{loading?"Verifying...":"✅ Verify & Continue"}</button>
        <button className="lskip" onClick={()=>{setStep("form");setOtp(["","","","","",""]);setErr("");}}>← Change number</button>
      </>)}

      {(tab==="cust"||tab==="reg")&&step==="form"&&(<>
        {tab==="reg"&&<div className="lf"><label>Full Name</label><input className="linput" type="text" value={nm} onChange={e=>setNm(e.target.value)} placeholder="e.g. Priya Sharma"/></div>}
        <div className="lf"><label>Mobile Number</label>
          <div className="phone-w"><span className="phone-pfx">🇮🇳 +91</span>
            <input type="tel" value={ph} onChange={e=>setPh(e.target.value.replace(/\D/g,"").slice(0,10))} onKeyDown={e=>e.key==="Enter"&&sendOtp()} placeholder="98765 43210"/>
          </div>
        </div>
        <button className="lbtn" onClick={sendOtp} disabled={loading}>{loading?"Sending...":"📱 Get OTP"}</button>
        <div className="or-r"><div/><span>or</span><div/></div>
        <button className="gbtn" onClick={()=>{setLoading(true);setTimeout(()=>{setLoading(false);onCust({name:"Google User",phone:""});},900);}}>
          <span style={{fontSize:18}}>🔵</span> Continue with Google
        </button>
        <button className="lskip" onClick={onClose}>Browse without signing in →</button>
      </>)}

      {tab==="owner"&&(<>
        <div className="owner-note">🔒 This section is for <b>M Vara Lakshmi</b> (Owner) only. Unauthorised access will be denied.</div>
        <div className="lf"><label>Admin Email</label>
          <input className="linput" type="email" value={em} onChange={e=>setEm(e.target.value)} onKeyDown={e=>e.key==="Enter"&&adminLogin()} placeholder="Enter admin email"/>
        </div>
        <div className="lf"><label>Password</label>
          <div className="pw-w">
            <input className="linput" type={showPw?"text":"password"} value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&adminLogin()} placeholder="Enter password"/>
            <button className="pw-eye" onClick={()=>setShowPw(s=>!s)}>{showPw?"🙈":"👁️"}</button>
          </div>
        </div>
        <button className="lbtn" onClick={adminLogin} disabled={loading}>{loading?"Signing in...":"🔐 Sign In to Owner Panel"}</button>
        <p style={{textAlign:"center",fontSize:12,color:"var(--ts)",marginTop:6}}>Wrong credentials = no access granted.</p>
      </>)}
    </div>
  </div></div>);
}

// ROOT APP
function App(){
  const [pg,setPg]=useState("home");
  const [filter,setFilter]=useState(null);
  const [adm,setAdm]=useState(false);
  const [cust,setCust]=useState(null);
  const [showLogin,setShowLogin]=useState(false);
  const {m,s,toast}=useToast();
  const [cart,setCart]=useState([]);

  const addCart=(it)=>setCart(c=>[...c,{...it,cartId:Date.now()+Math.random()}]);
  const rmCart=(id)=>setCart(c=>c.filter(i=>i.cartId!==id));
  const clearCart=()=>setCart([]);
  const total=cart.reduce((sum,i)=>sum+i.p,0);
  const cartN=cart.length;

  const go=(p)=>{
    if(p==="dashboard"&&!cust){setShowLogin(true);return;}
    if(p==="admin"&&!adm){setShowLogin(true);return;}
    setPg(p);window.scrollTo({top:0,behavior:"smooth"});
  };

  const handleCustLogin=(user)=>{
    setCust(user);setShowLogin(false);
    toast("Welcome, "+user.name+"! 👋");
  };
  const handleAdminLogin=()=>{
    setAdm(true);setShowLogin(false);
    setPg("admin");
    toast("✅ Welcome back, M Vara Lakshmi! 🏪");
  };
  const custOut=()=>{setCust(null);setPg("home");toast("Signed out successfully");};
  const admOut=()=>{setAdm(false);setPg("home");toast("Signed out of admin panel");};

  return(<div>
    <Nav pg={pg} go={go} cartN={cartN} cust={cust} adm={adm}
      onLogin={()=>setShowLogin(true)}
      onCustOut={custOut}
      onAdmOut={admOut}
    />

    {showLogin&&<LoginModal
      onCust={handleCustLogin}
      onAdmin={handleAdminLogin}
      onClose={()=>setShowLogin(false)}
    />}

    <main>
      {pg==="home"&&<Home go={go} setFilter={setFilter} addCart={addCart} toast={toast}/>}
      {pg==="gallery"&&<Gallery addCart={addCart} toast={toast} filter={filter} setFilter={setFilter}/>}
      {pg==="tracker"&&<Tracker/>}
      {pg==="measure"&&<Measurements toast={toast}/>}
      {pg==="appt"&&<Appointment toast={toast}/>}
      {pg==="cart"&&<Cart cart={cart} rm={rmCart} clear={clearCart} total={total} toast={toast} go={go}/>}
      {pg==="dashboard"&&cust&&<Dashboard cust={cust} go={go} toast={toast} onOut={custOut}/>}
      {pg==="admin"&&adm&&<Admin toast={toast} onOut={admOut}/>}
    </main>

    {pg!=="admin"&&<Footer go={go} toast={toast}/>}
    {pg!=="admin"&&(
      <a className="wa" href="https://wa.me/918519859829?text=Hello! I am interested in your blouse designs." target="_blank" rel="noreferrer">💬</a>
    )}

    <div className={"toast"+(s?" show":"")}>{m}</div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
