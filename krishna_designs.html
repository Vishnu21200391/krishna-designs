<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Krishna Designs — Premium Blouse & Embroidery, Eluru</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--maroon:#800020;--maroon-hover:#9a0028;--maroon-dark:#5c0016;--gold:#D4AF37;--gold-light:#e8c84a;--gold-dark:#a8891d;--beige:#F8F4EC;--beige-dark:#ede8da;--white:#fff;--text:#1a0a0f;--text-mid:#5a3040;--text-muted:#9a7080}
html{scroll-behavior:smooth}
body{font-family:'Cormorant Garamond',serif;background:var(--white);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--beige)}::-webkit-scrollbar-thumb{background:var(--maroon);border-radius:3px}
.nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(212,175,55,.25);height:64px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:var(--maroon);cursor:pointer;user-select:none}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:1.5rem;list-style:none}
.nav-link{background:none;border:none;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--text-mid);padding:4px 0;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.nav-link:hover,.nav-link.active{color:var(--maroon);border-bottom-color:var(--gold)}
.nav-right{display:flex;gap:8px;align-items:center}
.btn-ghost{background:none;border:1px solid var(--beige-dark);color:var(--text-mid);padding:7px 14px;border-radius:2px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:15px;transition:all .2s}
.btn-ghost:hover{border-color:var(--maroon);color:var(--maroon)}
.btn-solid{background:var(--maroon);color:#fff;border:none;padding:7px 16px;border-radius:2px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:15px;transition:background .2s}
.btn-solid:hover{background:var(--maroon-hover)}
.mob-toggle{display:none;background:none;border:none;font-size:24px;cursor:pointer;color:var(--maroon)}
.hero{background:linear-gradient(135deg,var(--maroon-dark) 0%,var(--maroon) 50%,#6b0019 100%);padding:4.5rem 1.5rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(212,175,55,.04) 40px,rgba(212,175,55,.04) 41px)}
.hero-inner{max-width:960px;margin:0 auto;display:grid;grid-template-columns:1.1fr .9fr;gap:3rem;align-items:center;position:relative;z-index:1}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.3);color:#e8c84a;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;border-radius:1px;margin-bottom:1.25rem}
.hero h1{font-family:'Playfair Display',serif;font-size:40px;font-weight:700;color:#fff;line-height:1.12;margin-bottom:1.1rem}
.hero h1 em{color:var(--gold);font-style:italic}
.hero-sub{color:rgba(255,255,255,.72);font-size:17px;font-weight:300;line-height:1.7;margin-bottom:1.75rem}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn-gold{background:var(--gold);color:var(--text);border:none;padding:12px 28px;border-radius:2px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;transition:all .2s}
.btn-gold:hover{background:var(--gold-light);transform:translateY(-1px)}
.btn-outline-w{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4);padding:12px 28px;border-radius:2px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:17px;transition:all .2s}
.btn-outline-w:hover{border-color:#fff;background:rgba(255,255,255,.08)}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:1.25rem}
.stat-box{text-align:center;padding:.9rem;background:rgba(255,255,255,.07);border:1px solid rgba(212,175,55,.18);border-radius:2px}
.stat-num{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold);font-weight:700}
.stat-lbl{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.5px;margin-top:2px}
.hero-cards{display:flex;flex-direction:column;gap:10px}
.hero-card{background:rgba(255,255,255,.07);border:1px solid rgba(212,175,55,.2);border-radius:4px;padding:.9rem 1.1rem;display:flex;align-items:center;gap:12px}
.hero-card-icon{width:44px;height:44px;flex-shrink:0;background:rgba(212,175,55,.12);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:20px}
.hero-card strong{font-size:14px;color:#fff;display:block}.hero-card span{font-size:12px;color:rgba(255,255,255,.5)}
.banner{background:var(--maroon);color:#fff;padding:1rem 1.5rem;text-align:center}
.banner-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap}
.banner-item{display:flex;align-items:center;gap:7px;font-size:13px;color:rgba(255,255,255,.88)}
.section{padding:4rem 1.5rem}.section.bg-beige{background:var(--beige)}
.section-inner{max-width:960px;margin:0 auto}.section-inner.narrow{max-width:700px}
.section-head{text-align:center;margin-bottom:2.5rem}
.section-tag{display:inline-block;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold-dark);margin-bottom:.6rem}
.section-head h2{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;color:var(--text);margin-bottom:.4rem}
.section-head p{color:var(--text-muted);font-size:17px;font-weight:300}
.gold-line{width:60px;height:2px;background:var(--gold);margin:.9rem auto 0}
.steps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.step-box{text-align:center}
.step-icon{width:54px;height:54px;background:var(--maroon);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:22px;box-shadow:0 4px 12px rgba(128,0,32,.25)}
.step-num{display:inline-block;background:var(--gold);color:var(--text);font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;margin-bottom:7px;letter-spacing:.5px}
.step-box h3{font-family:'Playfair Display',serif;font-size:15px;margin-bottom:5px}
.step-box p{font-size:13px;color:var(--text-muted);font-weight:300;line-height:1.6}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.cat-card{background:var(--white);border:1px solid var(--beige-dark);border-radius:4px;padding:1.5rem 1.1rem;cursor:pointer;transition:all .25s;text-align:center;position:relative;overflow:hidden}
.cat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold);transform:scaleX(0);transition:transform .3s;transform-origin:left}
.cat-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 4px 24px rgba(128,0,32,.10)}
.cat-card:hover::after{transform:scaleX(1)}
.cat-icon{width:56px;height:56px;background:var(--beige);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto .9rem;font-size:26px}
.cat-card h3{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);margin-bottom:3px}
.cat-card p{font-size:13px;color:var(--text-muted);font-weight:300}
.cat-count{display:inline-block;margin-top:8px;font-size:11px;letter-spacing:1px;color:var(--gold-dark);text-transform:uppercase}
.gallery-filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1.75rem;justify-content:center}
.filter-btn{background:none;border:1px solid var(--beige-dark);color:var(--text-mid);padding:6px 16px;border-radius:100px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:14px;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:var(--maroon);color:#fff;border-color:var(--maroon)}
.designs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.design-card{background:var(--white);border:1px solid var(--beige-dark);border-radius:4px;overflow:hidden;cursor:pointer;transition:all .25s}
.design-card:hover{box-shadow:0 12px 40px rgba(128,0,32,.18);transform:translateY(-4px);border-color:rgba(212,175,55,.4)}
.design-img{height:180px;position:relative;display:flex;align-items:center;justify-content:center;font-size:60px}
.design-badge{position:absolute;top:9px;left:9px;background:var(--maroon);color:#fff;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:1px}
.day-badge{position:absolute;bottom:9px;left:9px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;padding:3px 8px;border-radius:100px}
.wish-btn{position:absolute;top:9px;right:9px;width:30px;height:30px;background:rgba(255,255,255,.92);border:none;border-radius:50%;cursor:pointer;font-size:15px;transition:transform .2s}
.wish-btn:hover{transform:scale(1.15)}
.design-body{padding:1rem}
.design-body h3{font-family:'Playfair Display',serif;font-size:15px;color:var(--text);margin-bottom:3px}
.design-body p{font-size:12px;color:var(--text-muted)}
.design-meta{display:flex;justify-content:space-between;align-items:center;margin:8px 0}
.design-price{font-size:18px;font-weight:500;color:var(--maroon)}
.design-price small{font-size:11px;color:var(--text-muted);font-weight:300}
.day-pill{font-size:11px;padding:2px 8px;border-radius:100px;font-weight:600}
.btn-view{width:100%;background:transparent;border:1px solid var(--maroon);color:var(--maroon);padding:8px;border-radius:2px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:14px;transition:all .2s}
.btn-view:hover{background:var(--maroon);color:#fff}
.modal-overlay{position:fixed;inset:0;background:rgba(26,10,15,.65);z-index:500;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.modal{background:#fff;border-radius:6px;width:100%;max-width:620px;max-height:88vh;overflow-y:auto;position:relative;animation:mIn .25s ease}
@keyframes mIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-img{height:200px;display:flex;align-items:center;justify-content:center;font-size:76px}
.modal-body{padding:1.5rem}
.modal-body h2{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:.4rem}
.modal-tags{display:flex;gap:7px;flex-wrap:wrap;margin:1rem 0}
.tag{font-size:12px;padding:3px 11px;background:var(--beige);border-radius:100px;color:var(--text-mid)}
.modal-close{position:absolute;top:11px;right:11px;width:34px;height:34px;background:rgba(255,255,255,.9);border:none;border-radius:50%;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
.upload-box{border:2px dashed var(--beige-dark);border-radius:4px;padding:1.25rem;text-align:center;cursor:pointer;transition:border-color .2s;margin:.6rem 0}
.upload-box:hover{border-color:var(--gold)}
.upload-box span{font-size:12px;color:var(--text-muted);display:block;margin-top:5px}
.modal-actions{display:flex;gap:10px;margin-top:1.25rem}
.btn-maroon{flex:1;background:var(--maroon);color:#fff;border:none;padding:12px;border-radius:2px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:16px;transition:background .2s}
.btn-maroon:hover{background:var(--maroon-hover)}
.btn-outlined{flex:1;background:transparent;color:var(--maroon);border:1px solid var(--maroon);padding:12px;border-radius:2px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:16px;transition:all .2s}
.btn-outlined:hover{background:var(--maroon);color:#fff}
.modal-lbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin:12px 0 5px;display:block}
.special-note{width:100%;padding:10px 13px;border:1px solid var(--beige-dark);border-radius:2px;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--text);background:var(--beige);resize:vertical;min-height:75px;outline:none}
.special-note:focus{border-color:var(--gold)}
.card{background:#fff;border:1px solid var(--beige-dark);border-radius:6px;padding:1.75rem}
.track-row{display:flex;gap:9px;margin-bottom:1.5rem}
.track-input{flex:1;padding:10px 14px;border:1px solid var(--beige-dark);border-radius:2px;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--text);background:var(--beige);outline:none;transition:border-color .2s}
.track-input:focus{border-color:var(--gold)}
.btn-track{background:var(--maroon);color:#fff;border:none;padding:10px 24px;border-radius:2px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:16px}
.order-meta{display:flex;flex-wrap:wrap;gap:10px;background:var(--beige);border-radius:4px;padding:.9rem 1.1rem;margin-bottom:1.75rem;justify-content:space-between}
.meta-item .mlbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted)}
.meta-item .mval{font-family:'Playfair Display',serif;font-size:15px;color:var(--text);margin-top:2px}
.mval.red{color:var(--maroon)}
.timeline{padding-left:2.4rem;position:relative}
.timeline::before{content:'';position:absolute;left:14px;top:12px;bottom:12px;width:2px;background:var(--beige-dark)}
.tl-row{display:flex;align-items:flex-start;gap:.9rem;margin-bottom:1.5rem;position:relative}
.tl-row:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-2.4rem;width:30px;height:30px;border-radius:50%;border:2px solid var(--beige-dark);background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.tl-row.done .tl-dot{background:var(--maroon);border-color:var(--maroon)}
.tl-row.active .tl-dot{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 4px rgba(212,175,55,.2)}
.tl-lbl{font-size:14px;font-weight:500;color:var(--text)}
.tl-row.done .tl-lbl{color:var(--text-muted);font-weight:400}
.tl-row.active .tl-lbl{color:var(--maroon)}
.tl-sub{font-size:12px;color:var(--text-muted);font-weight:300;margin-top:2px}
.tl-date{font-size:11px;color:var(--gold-dark);margin-top:3px}
.meas-tabs{display:flex;border-bottom:2px solid var(--beige-dark);margin-bottom:1.75rem}
.meas-tab{padding:9px 20px;background:none;border:none;font-family:'Cormorant Garamond',serif;font-size:16px;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.meas-tab.active{color:var(--maroon);border-bottom-color:var(--maroon);font-weight:500}
.meas-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.meas-field{background:var(--beige);border-radius:2px;padding:9px 13px}
.meas-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:4px}
.meas-input{width:100%;background:none;border:none;border-bottom:1px solid var(--beige-dark);font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--text);padding:3px 0;outline:none}
.meas-input:focus{border-bottom-color:var(--gold)}
.btn-save{width:100%;margin-top:1.1rem;background:var(--maroon);color:#fff;border:none;padding:12px;border-radius:2px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:16px}
.btn-save:hover{background:var(--maroon-hover)}
.hint-box{padding:10px 13px;background:var(--beige);border-radius:2px;font-size:13px;color:var(--text-muted);margin-top:.9rem;font-weight:300;border-left:3px solid var(--gold)}
.appt-lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:9px;display:block}
.pill-group{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1.25rem}
.pill{padding:7px 18px;border:1px solid var(--beige-dark);background:none;color:var(--text-mid);border-radius:100px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:14px;transition:all .2s}
.pill:hover{border-color:var(--maroon);color:var(--maroon)}
.pill.active{background:var(--maroon);color:#fff;border-color:var(--maroon)}
.pill.disabled{opacity:.4;cursor:not-allowed}
.date-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:1.25rem}
.date-head{text-align:center;font-size:10px;color:var(--text-muted);padding:3px 0}
.date-cell{text-align:center;padding:7px 3px;border:1px solid var(--beige-dark);border-radius:2px;font-size:13px;cursor:pointer;transition:all .2s}
.date-cell:hover:not(.past){border-color:var(--gold);background:rgba(212,175,55,.08)}
.date-cell.sel{background:var(--maroon);color:#fff;border-color:var(--maroon)}
.date-cell.past{opacity:.35;cursor:not-allowed}
.appt-summary{background:var(--beige);border-radius:4px;padding:.9rem 1.1rem;margin-bottom:.9rem;font-size:14px;line-height:1.7;border-left:3px solid var(--gold)}
.cart-item{display:flex;align-items:center;gap:.9rem;padding:.9rem 0;border-bottom:1px solid var(--beige-dark)}
.cart-item-img{width:58px;height:58px;border-radius:2px;background:var(--beige);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.cart-item-name{font-family:'Playfair Display',serif;font-size:15px}
.cart-item-price{font-size:16px;color:var(--maroon);font-weight:500;margin-top:3px}
.cart-item-remove{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:18px;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.coupon-row{display:flex;gap:9px;margin:1rem 0}
.coupon-input{flex:1;padding:9px 13px;border:1px solid var(--beige-dark);border-radius:2px;font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--text);background:var(--beige);outline:none}
.coupon-input:focus{border-color:var(--gold)}
.btn-apply{background:none;border:1px solid var(--maroon);color:var(--maroon);padding:9px 16px;border-radius:2px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:15px;transition:all .2s}
.btn-apply:hover{background:var(--maroon);color:#fff}
.price-breakdown{background:var(--beige);border-radius:4px;padding:1.1rem}
.price-row{display:flex;justify-content:space-between;font-size:14px;padding:4px 0}
.price-row.disc{color:green}
.price-row.total{border-top:1px solid var(--beige-dark);margin-top:7px;padding-top:10px;font-family:'Playfair Display',serif;font-size:19px;color:var(--maroon)}
.test-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.test-card{background:#fff;border:1px solid var(--beige-dark);border-radius:4px;padding:1.4rem}
.test-stars{color:var(--gold);font-size:17px;margin-bottom:.6rem}
.test-card blockquote{font-size:15px;font-weight:300;line-height:1.7;color:var(--text-mid);margin-bottom:.9rem;font-style:italic}
.test-name{font-size:13px;font-weight:500;color:var(--text)}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.table-wrap{overflow-x:auto}
table.data-table{width:100%;border-collapse:collapse;font-size:14px}
table.data-table th{text-align:left;padding:9px 13px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);border-bottom:2px solid var(--beige-dark);font-weight:500;white-space:nowrap}
table.data-table td{padding:11px 13px;border-bottom:1px solid var(--beige)}
table.data-table tr:hover td{background:var(--beige)}
.status-badge{display:inline-block;padding:3px 9px;border-radius:100px;font-size:11px}
.badge-pending{background:#fff8e1;color:#b45309}
.badge-progress{background:#e0f0ff;color:#1d5fa4}
.badge-ready{background:#e0ffe8;color:#1a7a36}
.badge-delivered{background:var(--beige);color:var(--text-muted)}
.status-select{background:var(--beige);border:1px solid var(--beige-dark);border-radius:2px;padding:4px 9px;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--text);cursor:pointer;outline:none}
.icon-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--text-muted);padding:3px;border-radius:2px}
.login-box{background:#fff;border-radius:8px;padding:2.25rem;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(128,0,32,.10);border:1px solid var(--beige-dark)}
.login-logo{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--maroon);text-align:center}
.login-logo span{color:var(--gold)}
.otp-inputs{display:flex;gap:7px;justify-content:center;margin-bottom:1.5rem}
.otp-inp{width:42px;height:50px;text-align:center;font-family:'Playfair Display',serif;font-size:21px;font-weight:700;border:1px solid var(--beige-dark);border-radius:4px;background:var(--beige);outline:none;color:var(--maroon)}
.otp-inp:focus{border-color:var(--gold)}

function App(){
  const [page,setPage]=useState("home");const [filter,setFilter]=useState(null);
  const [adminAuth,setAdminAuth]=useState(false);const [custAuth,setCustAuth]=useState(null);
  const [showCustLogin,setShowCustLogin]=useState(false);const [showAdminLogin,setShowAdminLogin]=useState(false);
  const {msg,show,toast}=useToast();
  const [cart,setCart]=useState([]);
  const addItem=(item)=>setCart(c=>[...c,{...item,cartId:Date.now()+Math.random()}]);
  const removeItem=(id)=>setCart(c=>c.filter(i=>i.cartId!==id));
  const clearCart=()=>setCart([]);
  const total=cart.reduce((s,i)=>s+i.price,0);const count=cart.length;
  const goPage=(p)=>{
    if(p==="admin"){if(!adminAuth){setShowAdminLogin(true);return;}}
    if(p==="dashboard"&&!custAuth){setShowCustLogin(true);return;}
    setPage(p);window.scrollTo({top:0,behavior:"smooth"});
  };
  const handleAdminLogin=()=>{setAdminAuth(true);setShowAdminLogin(false);setPage("admin");toast("✅ Welcome back, M Vara Lakshmi!");};
  const handleAdminLogout=()=>{setAdminAuth(false);setPage("home");toast("Logged out of Admin Panel");};
  const handleCustLogin=(user)=>{setCustAuth(user);setShowCustLogin(false);toast("Welcome, "+user.name+"! 👋");};
  const handleCustLogout=()=>{setCustAuth(null);setPage("home");toast("Logged out successfully");};

  if(showAdminLogin)return(<><AdminLogin onLogin={handleAdminLogin}/><button onClick={()=>setShowAdminLogin(false)} style={{position:"fixed",top:16,left:16,zIndex:999,background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.3)",color:"#fff",padding:"7px 15px",borderRadius:4,cursor:"pointer",fontFamily:"Cormorant Garamond,serif",fontSize:14}}>← Back to Store</button></>);

  return(<div>
    <Nav page={page} setPage={goPage} cartCount={count} custAuth={custAuth} adminAuth={adminAuth} onCustLogin={()=>setShowCustLogin(true)} onCustLogout={handleCustLogout} onAdminLogout={handleAdminLogout}/>
    {showCustLogin&&<CustomerLoginModal onLogin={handleCustLogin} onClose={()=>setShowCustLogin(false)}/>}
    <main>
      {page==="home"&&<Home setPage={goPage} setFilter={setFilter} addToCart={addItem} toast={toast}/>}
      {page==="gallery"&&<Gallery addToCart={addItem} toast={toast} filter={filter} setFilter={setFilter}/>}
      {page==="tracker"&&<Tracker/>}
      {page==="measure"&&<Measurements toast={toast}/>}
      {page==="appt"&&<Appointment toast={toast}/>}
      {page==="cart"&&<Cart cart={cart} removeItem={removeItem} clearCart={clearCart} total={total} toast={toast} setPage={goPage}/>}
      {page==="dashboard"&&custAuth&&<Dashboard custAuth={custAuth} setPage={goPage} toast={toast} onLogout={handleCustLogout}/>}
      {page==="admin"&&adminAuth&&<Admin toast={toast} onLogout={handleAdminLogout}/>}
    </main>
    {page!=="admin"&&<Footer setPage={goPage} toast={toast}/>}
    {page!=="admin"&&<a className="wa-float" href="https://wa.me/918519859829?text=Hello, I am interested in your blouse designs!" target="_blank" rel="noreferrer">💬</a>}
    <div className={"toast"+(show?" show":"")}>{msg}</div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
